# Mixed u-p J2 plasticity example: a unit cube pulled in x past yield.
#
# Generate the mesh from the repo root, then run cmad from examples/
# (deck paths resolve against the working directory):
#   python examples/make_cube_mesh.py   # writes examples/meshes/cube_hex_8.exo
#   cd examples
#   cmad primal mixed_plastic.yaml

problem:
  type: fe
  name: mixed_plastic

discretization:
  mesh file: meshes/cube_hex_8.exo
  num steps: 5
  step size: 0.2

residuals:
  global residual:
    type: small_disp_equilibrium
    def_type: full_3d
    mixed: true
    stabilization multiplier: 1.0
    nonlinear max iters: 15
    nonlinear absolute tol: 1.0e-9
    nonlinear relative tol: 1.0e-9
  local residual:
    type: small_elastic_plastic
    nonlinear max iters: 100
    nonlinear absolute tol: 1.0e-12
    nonlinear relative tol: 1.0e-12
    materials:
      all:
        elastic: {E: 200000.0, nu: 0.3}
        plastic:
          effective stress: {J2: 0.0}
          flow stress:
            initial yield: {Y: 200.0}
            hardening: {voce: {S: 200.0, D: 20.0}}

# Symmetry on the three min faces; the x=max face is pulled in +x past yield.
dirichlet bcs:
  expression:
    sym_x:  [equilibrium, 0, xmin_sides, "0.0"]
    sym_y:  [equilibrium, 1, ymin_sides, "0.0"]
    sym_z:  [equilibrium, 2, zmin_sides, "0.0"]
    load_x: [equilibrium, 0, xmax_sides, "0.005 * t"]

linear solver:
  type: direct

output:
  path: results
  exodus filename: mixed_plastic_primal.exo
  global residual: [u, p]
  local residual:
    all: [cauchy, alpha]
