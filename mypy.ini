[mypy]
python_version = 3.10
warn_unused_ignores = True
warn_redundant_casts = True
strict_optional = True

# ----- third-party libraries without stubs we want to consume -----

[mypy-jax.*]
ignore_missing_imports = True

[mypy-jaxlib.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-sympy.*]
ignore_missing_imports = True

[mypy-meshio.*]
ignore_missing_imports = True

[mypy-pygmsh.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

# ----- application / domain code (annotation deferred indefinitely) -----

[mypy-cmad.calibrations.*]
ignore_errors = True

[mypy-cmad.neural_networks.*]
ignore_errors = True

[mypy-cmad.util.*]
ignore_errors = True

[mypy-cmad.verification.*]
ignore_errors = True
