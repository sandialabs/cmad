[mypy]
python_version = 3.10
warn_unused_ignores = True
warn_redundant_casts = True
strict_optional = True

# ----- third-party libraries without stubs we want to consume -----

[mypy-jax.*]
ignore_missing_imports = True

[mypy-jaxlib.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-sympy.*]
ignore_missing_imports = True

[mypy-meshio.*]
ignore_missing_imports = True

[mypy-pygmsh.*]
ignore_missing_imports = True

# ----- subclass models: annotated in commit 9; strict checking deferred to
# commit 10 because most remaining errors are downstream of unannotated
# var_types / kinematics / effective_stress / hardening helpers, which
# commit 10 annotates -----

[mypy-cmad.models.small_elastic_plastic]
ignore_errors = True

[mypy-cmad.models.small_rate_elastic_plastic]
ignore_errors = True

[mypy-cmad.models.elastic]
ignore_errors = True

# ----- modules deferred to commit 10 (supporting model modules) -----

[mypy-cmad.models.effective_stress]
ignore_errors = True

[mypy-cmad.models.hardening]
ignore_errors = True

[mypy-cmad.models.kinematics]
ignore_errors = True

[mypy-cmad.models.elastic_stress]
ignore_errors = True

[mypy-cmad.models.elastic_potential]
ignore_errors = True

[mypy-cmad.models.paths]
ignore_errors = True

# ----- application / domain code (annotation deferred indefinitely) -----

[mypy-cmad.calibrations.*]
ignore_errors = True

[mypy-cmad.neural_networks.*]
ignore_errors = True

[mypy-cmad.util.*]
ignore_errors = True

[mypy-cmad.verification.*]
ignore_errors = True
