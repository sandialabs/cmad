target-version = "py310"
line-length = 88

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes (unused imports, undefined names)
    "I",    # isort
    "B",    # flake8-bugbear (likely-bug patterns)
    "UP",   # pyupgrade (modern Python idioms)
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line-too-long; codebase has long lines, handle separately if at all
    "E741",  # ambiguous-variable-name; `I` (identity matrix) etc. are
             # established math notation in scientific code
]

[lint.per-file-ignores]
"examples/*" = ["F401", "B008"]  # scripts may have unused imports / shared
                                 # numpy-array defaults (FD step sizes, etc.)
"tests/*" = ["F401", "B008"]
