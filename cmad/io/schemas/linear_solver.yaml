$schema: https://json-schema.org/draft/2020-12/schema
type: object
required: [type]
additionalProperties: false
properties:
  type:
    type: string
    enum: [direct, cg, gmres]
  rtol:
    type: number
    exclusiveMinimum: 0
  max iters:
    oneOf:
      - {type: integer, minimum: 1}
      - {type: 'null'}
  restart:
    type: integer
    minimum: 1
