$schema: https://json-schema.org/draft/2020-12/schema
type: object
required: [type]
additionalProperties: false
properties:
  type:
    type: string
    enum: [direct, cg, gmres]
  rtol:
    type: number
    exclusiveMinimum: 0
  max iters:
    oneOf:
      - {type: integer, minimum: 1}
      - {type: 'null'}
  restart:
    type: integer
    minimum: 1
  preconditioner:
    type: object
    required: [type]
    oneOf:
      - additionalProperties: false
        properties:
          type: {const: jacobi}
      - additionalProperties: false
        properties:
          type: {const: pyamg}
          kwargs:
            type: object
            additionalProperties: true
      - additionalProperties: false
        properties:
          type: {const: block}
          coupling:
            type: string
            enum: [diagonal, lower, upper]
          diagonal_block:
            type: string
            enum: [assembled, schur]
          inner:
            type: string
            enum: [jacobi, chebyshev, amg]
          degree:
            type: integer
            minimum: 1
