$schema: https://json-schema.org/draft/2020-12/schema
$defs:
  field_spec:
    type: object
    required: [name, var_type]
    additionalProperties: false
    properties:
      name: {type: string}
      var_type:
        enum: [scalar, vector, sym_tensor, tensor]
type: object
additionalProperties: false
required: [path]
properties:
  path: {type: string}
  prefix: {type: string, default: ""}
  format:
    enum: [npy, text, exodus]
    default: npy
  nodal fields:
    type: array
    items:
      $ref: '#/$defs/field_spec'
  element fields by block:
    type: object
    additionalProperties:
      type: array
      items:
        $ref: '#/$defs/field_spec'
