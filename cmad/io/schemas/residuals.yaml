$schema: https://json-schema.org/draft/2020-12/schema
$defs:
  leaf:
    type: object
    additionalProperties: false
    required: [value]
    properties:
      value: {}
      active:
        type: boolean
      transform:
        oneOf:
          - type: 'null'
          - type: object
            additionalProperties: false
            required: [bounds]
            properties:
              bounds:
                type: array
                minItems: 2
                maxItems: 2
                items: {type: number}
          - type: object
            additionalProperties: false
            required: [log]
            properties:
              log: {type: number}
  node:
    oneOf:
      - type: number
      - type: 'null'
      - type: array
      - type: object
        if:
          required: [value]
        then:
          $ref: '#/$defs/leaf'
        else:
          additionalProperties:
            $ref: '#/$defs/node'
  line_search:
    type: object
    additionalProperties: false
    properties:
      max evals: {type: integer, minimum: 1}
      sufficient decrease: {type: number, exclusiveMinimum: 0}
      min backtrack factor: {type: number, exclusiveMinimum: 0, maximum: 1}
      max backtrack factor: {type: number, exclusiveMinimum: 0, maximum: 1}
      print: {type: boolean}
type: object
required: [global residual, local residual]
additionalProperties: false
properties:
  global residual:
    type: object
    required: [type]
    additionalProperties: false
    properties:
      type: {type: string}
      def_type:
        enum: [full_3d, plane_strain, plane_stress, uniaxial_stress]
      nonlinear max iters:
        type: integer
        minimum: 1
      nonlinear absolute tol:
        type: number
        exclusiveMinimum: 0
      nonlinear relative tol:
        type: number
        exclusiveMinimum: 0
      print convergence:
        type: boolean
      line search:
        $ref: '#/$defs/line_search'
  local residual:
    type: object
    required: [type, materials]
    properties:
      type: {type: string}
      nonlinear max iters: {type: integer, minimum: 1}
      nonlinear absolute tol: {type: number, exclusiveMinimum: 0}
      nonlinear relative tol: {type: number, exclusiveMinimum: 0}
      print convergence: {type: boolean, default: false}
      materials:
        type: object
        additionalProperties:
          $ref: '#/$defs/node'
