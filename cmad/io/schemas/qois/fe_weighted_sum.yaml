$schema: https://json-schema.org/draft/2020-12/schema
type: object
required: [name, terms]
additionalProperties: false
properties:
  name:
    const: fe_weighted_sum
  terms:
    type: array
    minItems: 1
    items:
      type: object
      required: [name]
      additionalProperties: true
      properties:
        name:
          type: string
