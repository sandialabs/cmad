name: cmad
channels:
  - defaults
  - conda-forge
dependencies:
  - python>=3.10
  - numpy>=1.23
  - matplotlib
  - scipy>=1.7
  - jupyter
  - pytest
  - coverage>=6.4
  - pytest-cov
  - mypy
  - ruff
  - pip
  - setuptools
  - scikit-learn
  - sympy
  - jsonschema
  - pyyaml
  # documentation
  - sphinx
  - sphinx-gallery
  - pip:
    - sphinx_copybutton
    - sphinx_rtd_theme
    - numpydoc
    - sphinx_automodapi
    - jax[cpu]>=0.4.20
